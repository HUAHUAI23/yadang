name: Vector API FastAPI CI

on:
  workflow_dispatch:
    inputs:
      build_arm:
        description: "Build ARM64 image (requires ARM runner)"
        type: boolean
        default: true
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
    paths:
      - "services/vector-api-fastapi/**"
      - ".github/workflows/vector-api-fastapi-ci.yml"
      - "!**/*.md"
  push:
    branches: [main, master]
    paths:
      - "services/vector-api-fastapi/**"
      - ".github/workflows/vector-api-fastapi-ci.yml"
      - "!**/*.md"

permissions:
  packages: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  IMAGE_NAME: zrt-vector-api-fastapi

jobs:
  lint:
    name: Vector API Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup ruff
        uses: astral-sh/ruff-action@v3

      - name: Run ruff
        run: ruff check services/vector-api-fastapi/app

      - name: Compile check
        run: python -m compileall -q services/vector-api-fastapi/app

  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      build_arm: ${{ steps.set-matrix.outputs.build_arm }}
    steps:
      - name: Determine build matrix
        id: set-matrix
        run: |
          BUILD_ARM="true"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_ARM="${{ inputs.build_arm }}"
          elif [ "${{ github.event.repository.private }}" = "true" ]; then
            BUILD_ARM="false"
          fi

          echo "build_arm=$BUILD_ARM" >> "$GITHUB_OUTPUT"

          if [ "$BUILD_ARM" = "true" ]; then
            echo 'matrix={"include":[{"arch":"amd64","runs-on":"ubuntu-24.04"},{"arch":"arm64","runs-on":"ubuntu-24.04-arm"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"arch":"amd64","runs-on":"ubuntu-24.04"}]}' >> "$GITHUB_OUTPUT"
          fi

  build-images:
    name: Build Vector API Docker Images
    needs: [lint, setup]
    permissions:
      packages: write
      contents: read
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Convert repository owner to lowercase
        id: repo-owner
        run: |
          echo "lowercase=${GITHUB_REPOSITORY_OWNER@L}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: ${{ (matrix.arch == 'arm64' && runner.arch != 'ARM64') || (matrix.arch == 'amd64' && runner.arch != 'X64') }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.repo-owner.outputs.lowercase }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_USERNAME && format('docker.io/{0}/{1}', env.DOCKERHUB_USERNAME, env.IMAGE_NAME) || '' }}

      - name: Build for ${{ matrix.arch }}
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: ./services/vector-api-fastapi
          file: ./services/vector-api-fastapi/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/${{ matrix.arch }}
          push: false
          load: ${{ github.event_name == 'pull_request' }}
          outputs: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && format('type=image,"name=ghcr.io/{0}/{1}{2}",name-canonical=true,push-by-digest=true,push=true', steps.repo-owner.outputs.lowercase, env.IMAGE_NAME, env.DOCKERHUB_USERNAME && format(',docker.io/{0}/{1}', env.DOCKERHUB_USERNAME, env.IMAGE_NAME) || '') || '' }}
          cache-from: type=gha,scope=vector-build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=vector-build-${{ matrix.arch }}

      - name: Export digest
        if: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}
        run: |
          mkdir -p "${{ runner.temp }}/vector-digests"
          digest="${{ steps.docker-build.outputs.digest }}"
          touch "${{ runner.temp }}/vector-digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}
        uses: actions/upload-artifact@v4
        with:
          name: vector-digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/vector-digests/*
          if-no-files-found: error
          retention-days: 1

  release-images:
    name: Push Vector API Multi-Arch Docker Images
    permissions:
      packages: write
      contents: read
    needs: [setup, build-images]
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}
    steps:
      - name: Convert repository owner to lowercase
        id: repo-owner
        run: |
          echo "lowercase=${GITHUB_REPOSITORY_OWNER@L}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/vector-digests
          pattern: vector-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.repo-owner.outputs.lowercase }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_USERNAME && format('docker.io/{0}/{1}', env.DOCKERHUB_USERNAME, env.IMAGE_NAME) || '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.ref == format('refs/heads/{0}', 'master') }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/vector-digests
        run: |
          for TAG in $DOCKER_METADATA_OUTPUT_TAGS; do
            docker buildx imagetools create -t "$TAG" \
              $(printf 'ghcr.io/${{ steps.repo-owner.outputs.lowercase }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
            sleep 3
          done

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ steps.repo-owner.outputs.lowercase }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Generate build summary
        if: always()
        run: |
          BUILD_ARM="${{ needs.setup.outputs.build_arm }}"
          if [ "$BUILD_ARM" = "true" ]; then
            PLATFORMS="\`linux/amd64\`, \`linux/arm64\`"
          else
            PLATFORMS="\`linux/amd64\`"
          fi

          echo "## Vector API Docker Build & Push Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Build Status" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "- ✅ Build successful" >> "$GITHUB_STEP_SUMMARY"
            echo "- ✅ Platforms: $PLATFORMS" >> "$GITHUB_STEP_SUMMARY"
            echo "- ✅ Pushed to GHCR: \`ghcr.io/${{ steps.repo-owner.outputs.lowercase }}/${{ env.IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "${{ env.DOCKERHUB_USERNAME }}" ]; then
              echo "- ✅ Pushed to Docker Hub: \`docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- ❌ Build or push failed" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Build Information" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Framework**: FastAPI + Transformers + Torch" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit SHA**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by**: @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Event**: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build time**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Image Tags" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
