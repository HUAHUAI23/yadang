name: CI

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "package*.json"
      - "pnpm-lock.yaml"
      - "prisma/**"
      - ".github/workflows/ci.yml"
      - "!**/*.md"
  push:
    branches: [main, master]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "package*.json"
      - "pnpm-lock.yaml"
      - "prisma/**"
      - ".github/workflows/ci.yml"
      - "!**/*.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint
